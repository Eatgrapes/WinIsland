name: Rust Build & Docs

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/*.ps1'
              - 'resources/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - '.github/workflows/rust.yml'
            web:
              - 'Page/**'
              - '**/*.md'
              - '.github/workflows/rust.yml'

  build-rust:
    needs: changes
    if: >-
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') &&
      !contains(github.event.head_commit.message, '[ci-skip]') &&
      !contains(github.event.head_commit.message, '[docs]')
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Rust Cache
      uses: swatinem/rust-cache@v2
    - name: Install dependencies
      run: |
        choco install ninja innosetup -y
    - name: Build Release
      run: cargo build --release --verbose
      env:
        WINISLAND_PACKAGE_CHANNEL: nightly
    - name: Generate Version Info
      run: |
        $date = (Get-Date).ToUniversalTime().AddHours(8).ToString("yyyy-MM-dd HH:mm:ss")
        $json = @{ timestamp = $date } | ConvertTo-Json
        $json | Out-File -FilePath target/release/version_info.json -Encoding utf8
    - name: Restore identity signing certificate
      shell: pwsh
      env:
        WINISLAND_MSIX_CERT_PFX_BASE64: ${{ secrets.WINISLAND_MSIX_CERT_PFX_BASE64 }}
      run: |
        if ([string]::IsNullOrWhiteSpace($env:WINISLAND_MSIX_CERT_PFX_BASE64)) {
          throw 'WINISLAND_MSIX_CERT_PFX_BASE64 is not configured.'
        }
        $certificatePath = Join-Path $env:RUNNER_TEMP 'winisland-identity.pfx'
        [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINISLAND_MSIX_CERT_PFX_BASE64))
        "WINISLAND_MSIX_CERT_PATH=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    - name: Build Nightly Installer
      shell: pwsh
      env:
        WINISLAND_MSIX_CERT_PASSWORD: ${{ secrets.WINISLAND_MSIX_CERT_PASSWORD }}
      run: |
        if ([string]::IsNullOrWhiteSpace($env:WINISLAND_MSIX_CERT_PASSWORD)) {
          throw 'WINISLAND_MSIX_CERT_PASSWORD is not configured.'
        }
        $version = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages |
          Where-Object { $_.name -eq 'WinIsland' } |
          Select-Object -ExpandProperty version
        if ($env:GITHUB_RUN_NUMBER -gt 65535) {
          throw 'GITHUB_RUN_NUMBER exceeds the MSIX version range.'
        }
        .\packaging\installer\Build-Installer.ps1 `
          -Channel nightly `
          -Version "$version.$env:GITHUB_RUN_NUMBER" `
          -CertificatePath $env:WINISLAND_MSIX_CERT_PATH `
          -CertificatePassword $env:WINISLAND_MSIX_CERT_PASSWORD `
          -OutputDirectory .\target\installer\nightly
    - name: Delete Old Nightly Release
      run: |
        gh release delete nightly --yes --cleanup-tag
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
    - name: Upload Nightly Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      with:
        tag_name: nightly
        name: Nightly Build
        draft: false
        prerelease: true
        files: |
          target/installer/nightly/installer/WinIsland-Nightly-Setup.exe
          target/release/version_info.json
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docs:
    needs: changes
    if: >-
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true') &&
      !contains(github.event.head_commit.message, '[ci-skip]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: Page/package-lock.json
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        working-directory: Page
        run: npm ci
      - name: Build website
        working-directory: Page
        run: npm run build
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: Page/dist

  deploy-docs:
    if: >-
      always() &&
      github.repository == 'Eatgrapes/WinIsland' &&
      !contains(github.event.head_commit.message, '[ci-skip]') &&
      needs.build-docs.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [changes, build-docs]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
