name: Release App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number to release (e.g., 1.0.0 or v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Extract Release Notes
      run: |
        python .github/scripts/extract_changelog.py "${{ inputs.version }}"

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: swatinem/rust-cache@v2

    - name: Install dependencies
      run: |
        choco install ninja innosetup -y

    - name: Build Release
      run: cargo build --release --verbose
      env:
        WINISLAND_PACKAGE_CHANNEL: stable

    - name: Restore identity signing certificate
      shell: pwsh
      env:
        WINISLAND_MSIX_CERT_PFX_BASE64: ${{ secrets.WINISLAND_MSIX_CERT_PFX_BASE64 }}
      run: |
        if ([string]::IsNullOrWhiteSpace($env:WINISLAND_MSIX_CERT_PFX_BASE64)) {
          throw 'WINISLAND_MSIX_CERT_PFX_BASE64 is not configured.'
        }
        $certificatePath = Join-Path $env:RUNNER_TEMP 'winisland-identity.pfx'
        [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINISLAND_MSIX_CERT_PFX_BASE64))
        "WINISLAND_MSIX_CERT_PATH=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Build Installer
      shell: pwsh
      env:
        WINISLAND_MSIX_CERT_PASSWORD: ${{ secrets.WINISLAND_MSIX_CERT_PASSWORD }}
      run: |
        if ([string]::IsNullOrWhiteSpace($env:WINISLAND_MSIX_CERT_PASSWORD)) {
          throw 'WINISLAND_MSIX_CERT_PASSWORD is not configured.'
        }
        $version = '${{ inputs.version }}'.TrimStart('v', 'V')
        .\packaging\installer\Build-Installer.ps1 `
          -Channel stable `
          -Version "$version.0" `
          -CertificatePath $env:WINISLAND_MSIX_CERT_PATH `
          -CertificatePassword $env:WINISLAND_MSIX_CERT_PASSWORD `
          -OutputDirectory .\target\installer\stable

    - name: Determine Tag Name
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [[ "$VERSION" =~ ^[vV] ]]; then
          echo "TAG_NAME=$VERSION" >> $GITHUB_ENV
        else
          echo "TAG_NAME=v$VERSION" >> $GITHUB_ENV
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: ${{ env.TAG_NAME }}
        body_path: release_notes.txt
        draft: false
        prerelease: false
        files: |
          target/installer/stable/installer/WinIsland-Setup.exe
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
